<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Enhanced</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <div id="app">
        <h1>Admin Panel</h1>
        <button @click="gitHubAuthenticate">Log in with GitHub</button>
        <div v-if="isAuthenticated">
            <h2>Welcome Admin</h2>
            <textarea v-model="changes" placeholder="Write changes here..."></textarea>
            <button @click="commitChanges">Auto-sync Changes</button>
            <button @click="exportData">Export Data</button>
        </div>
        <div v-else>
            <p>Please log in to access the admin features.</p>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                isAuthenticated: false,
                changes: ''
            },
            methods: {
                gitHubAuthenticate: function() {
                    // GitHub authentication logic
                    // Implement OAuth flow here
                    this.isAuthenticated = true; // Simulating authentication
                },
                commitChanges: function() {
                    // Auto-sync to commit changes
                    alert('Changes have been committed to GitHub!');
                },
                exportData: function() {
                    // Manual export functionality
                    const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(this.changes));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute('href', dataStr);
                    downloadAnchorNode.setAttribute('download', 'export.json');
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                }
            }
        });
    </script>
</body>
</html>
