<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #admin-panel { display: none; }
    </style>
</head>
<body>
    <h1>Welcome to the Admin Panel</h1>
    <div id="login">
        <input type="password" id="password" placeholder="Enter Password" />
        <button onclick="authenticate()">Login</button>
    </div>
    <div id="admin-panel">
        <h2>Edit Site Content</h2>
        <textarea id="content" rows="10" cols="30">Initial site content here.</textarea><br>
        <button onclick="exportContent()">Export</button>
    </div>

    <script>
        function authenticate() {
            const passwordInput = document.getElementById('password');
            const correctPassword = 'admin123'; // Replace with a proper authentication method
            if (passwordInput.value === correctPassword) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('login').style.display = 'none';
            } else {
                alert('Incorrect password!');
            }
        }

        function exportContent() {
            const content = document.getElementById('content').value;
            const blob = new Blob([content], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = 'updated_content.html';
            link.click();
        }
    </script>
</body>
</html>
